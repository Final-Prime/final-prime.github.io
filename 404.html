<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0b0c0b">
  <title>404 — Final Prime</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="error-page">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="site-header">
    <div class="shell header-inner">
      <a class="brand" href="/" aria-label="Final Prime home">
        <img class="brand-mark" src="assets/mark.svg" width="36" height="36" alt="">
        <span class="brand-name">FINAL <span aria-hidden="true">/</span> PRIME</span>
      </a>
    </div>
  </header>

  <main class="error-main" id="main-content">
    <div class="shell">
      <section class="error-panel" aria-labelledby="error-title">
        <p class="error-code">404 / unresolved address</p>
        <h1 id="error-title">This path has<br>no final state.</h1>
        <p>The requested address does not exist in the current public system.</p>
        <a class="button button-primary" href="/">Return to origin</a>
      </section>
    </div>
  </main>
</body>
</html>
