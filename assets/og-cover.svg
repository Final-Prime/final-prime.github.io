  <text x="78" y="88" fill="#e8e4dc" font-family="monospace" font-size="24" font-weight="700" letter-spacing="6">FINAL <tspan fill="#c65d53">/</tspan> PRIME</text>
  <text x="78" y="272" fill="#f4f0e7" font-family="Georgia, serif" font-size="88">There is no</text>
  <text x="78" y="368" fill="#9f9b92" font-family="Georgia, serif" font-size="88" font-style="italic">final prime.</text>
  <text x="82" y="454" fill="#9f9b92" font-family="Arial, sans-serif" font-size="27">Shared systems and technical foundations</text>
  <text x="82" y="492" fill="#9f9b92" font-family="Arial, sans-serif" font-size="27">for independent products and operating teams.</text>
  <line x1="82" y1="552" x2="1118" y2="552" stroke="#3b3d37"/>
  <text x="82" y="590" fill="#807d75" font-family="monospace" font-size="17" letter-spacing="3">FUNDAMENTAL, NEVER FINAL.</text>
  <text x="1054" y="590" fill="#c65d53" font-family="monospace" font-size="17">01—∞</text>
