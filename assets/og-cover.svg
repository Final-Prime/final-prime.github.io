      <path d="M64 0H0V64" fill="none" stroke="#252622" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="75%" cy="15%" r="55%">
      <stop offset="0" stop-color="#c65d53" stop-opacity=".18"/>
      <stop offset="1" stop-color="#0b0c0b" stop-opacity="0"/>
