name: Review registry

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "thought/**"
      - "reviews/**"
      - "index/**"
      - "assets/review-*.css"
      - "assets/review-*.js"
      - "assets/reviews/**"
      - "docs/metro-2033-redux-import-audit.md"
      - "sitemap.xml"
      - "tools/check_review_registry.py"
      - ".github/workflows/review-registry.yml"
  pull_request:
    paths:
      - "index.html"
      - "thought/**"
      - "reviews/**"
      - "index/**"
      - "assets/review-*.css"
      - "assets/review-*.js"
      - "assets/reviews/**"
      - "docs/metro-2033-redux-import-audit.md"
      - "sitemap.xml"
      - "tools/check_review_registry.py"
      - ".github/workflows/review-registry.yml"

permissions:
  contents: read

jobs:
  verify-published-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Verify review registry
        run: python tools/check_review_registry.py
