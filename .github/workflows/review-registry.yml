name: Review registry

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "thought/**"
      - "reviews/**"
      - "index/**"
      - "assets/review-*.css"
      - "assets/review-*.js"
      - "assets/reviews/**"
      - "docs/metro-2033-redux-import-audit.md"
      - "sitemap.xml"
      - "tools/check_review_registry.py"
      - ".github/workflows/review-registry.yml"
  pull_request:
    paths:
      - "index.html"
      - "thought/**"
      - "reviews/**"
      - "index/**"
      - "assets/review-*.css"
      - "assets/review-*.js"
      - "assets/reviews/**"
      - "docs/metro-2033-redux-import-audit.md"
      - "sitemap.xml"
      - "tools/check_review_registry.py"
      - ".github/workflows/review-registry.yml"

permissions:
  contents: write

jobs:
  verify-published-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify review registry
        run: python tools/check_review_registry.py

  apply-score-layout-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-metro-score-anatomy-layout'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-metro-score-anatomy-layout
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser tooling
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Apply correction idempotently
        run: |
          python3 <<'PY'
          from pathlib import Path

          html_path = Path("reviews/metro-2033-redux/index.html")
          html = html_path.read_text(encoding="utf-8")
          old_title = '<h2 id="score-title">90 minus 4 <span>equals 86.</span></h2>'
          new_title = '<h2 id="score-title" aria-label="90 minus 4 equals 86">90 &minus; 4 <span class="score-title-result">= 86.</span></h2>'
          if old_title in html:
              html = html.replace(old_title, new_title, 1)
          elif new_title not in html:
              raise SystemExit("Neither score-title variant was found")

          old_equation = '<div class="score-equation" aria-label="Score calculation: 90 minus 4 equals 86"><div><small>Core axes</small><strong>90</strong></div><span aria-hidden="true">-</span><div><small>Fit / risk</small><strong>4</strong></div><span aria-hidden="true">=</span><div class="final"><small>Final score</small><strong>86</strong></div></div>'
          new_equation = '<div class="score-equation" aria-label="Score calculation: 90 minus 4 equals 86"><div><small>Core axes</small><strong>90</strong></div><span aria-hidden="true">&minus;</span><div><small>Fit / risk</small><strong>4</strong></div><span aria-hidden="true">=</span><div class="final"><small>Final score</small><strong>86</strong></div></div>'
          if old_equation in html:
              html = html.replace(old_equation, new_equation, 1)
          elif new_equation not in html:
              raise SystemExit("Neither score-equation variant was found")
          html_path.write_text(html, encoding="utf-8")

          css_path = Path("assets/review-dossier-polish.css")
          css = css_path.read_text(encoding="utf-8")
          marker = "/* Score anatomy correction: symbolic equation, single-line axis labels, and aligned receipts. */"
          if marker not in css:
              css += r'''

/* Score anatomy correction: symbolic equation, single-line axis labels, and aligned receipts. */
.review-dossier-page #score-title {
  font-variant-numeric: tabular-nums;
}

.review-dossier-page #score-title .score-title-result {
  display: block;
}

.review-dossier-page .dossier-axis-grid {
  align-items: stretch;
}

.review-dossier-page .dossier-axis {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  height: 100%;
}

.review-dossier-page .dossier-axis-body {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto auto;
  height: 100%;
}

.review-dossier-page .dossier-axis h3 {
  overflow-wrap: normal;
  word-break: normal;
  hyphens: none;
}

.review-dossier-page .dossier-axis p {
  min-height: 0;
}

.review-dossier-page .dossier-meter {
  align-self: end;
}

@media (min-width: 1181px) {
  .review-dossier-page .dossier-axis h3 {
    font-size: clamp(1.4rem, 1.75vw, 2.05rem);
    letter-spacing: -0.04em;
    white-space: nowrap;
  }
}
'''
              css_path.write_text(css, encoding="utf-8")
          PY

      - name: Run repository checks
        run: |
          python tools/check_editorial_style.py
          python tools/check_ip_notices.py
          python tools/check_review_registry.py

      - name: Run focused browser QA
        id: qa
        continue-on-error: true
        run: |
          mkdir -p metro-score-layout-qa
          python3 -m http.server 8000 --bind 127.0.0.1 > metro-score-layout-qa/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/reviews/metro-2033-redux/ > /dev/null && break
            sleep 1
          done

          node <<'NODE'
          const fs = require("fs");
          const { chromium } = require("playwright");
          const cases = [
            { name: "desktop-1920", width: 1920, height: 1080, scale: 1 },
            { name: "desktop-1440", width: 1440, height: 1000, scale: 1 },
            { name: "desktop-min-1181", width: 1181, height: 900, scale: 1 },
            { name: "tablet-1024", width: 1024, height: 900, scale: 1 },
            { name: "mobile-390", width: 390, height: 844, scale: 1 },
            { name: "mobile-320", width: 320, height: 800, scale: 1 },
            { name: "mobile-390-text-200", width: 390, height: 844, scale: 2 }
          ];

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const failures = [];
            const results = [];

            for (const item of cases) {
              const context = await browser.newContext({ viewport: { width: item.width, height: item.height }, reducedMotion: "reduce" });
              const page = await context.newPage();
              const runtimeErrors = [];
              const failedAssets = [];
              page.on("pageerror", error => runtimeErrors.push(String(error)));
              page.on("console", message => { if (message.type() === "error") runtimeErrors.push(message.text()); });
              page.on("response", response => {
                if (response.url().startsWith("http://127.0.0.1:8000/") && response.status() >= 400) failedAssets.push(`${response.status()} ${response.url()}`);
              });

              const response = await page.goto("http://127.0.0.1:8000/reviews/metro-2033-redux/", { waitUntil: "networkidle" });
              if (!response || response.status() !== 200) failures.push(`${item.name}: route did not return HTTP 200`);
              if (item.scale === 2) {
                await page.evaluate(() => { document.documentElement.style.fontSize = "200%"; });
                await page.waitForTimeout(120);
              }

              const metrics = await page.evaluate(() => {
                const title = document.querySelector("#score-title");
                const headings = [...document.querySelectorAll(".dossier-axis h3")];
                const meters = [...document.querySelectorAll(".dossier-meter")];
                const grades = [...document.querySelectorAll(".dossier-axis-body > small")];
                const headingMetrics = headings.map(node => {
                  const rect = node.getBoundingClientRect();
                  const lineHeight = Number.parseFloat(getComputedStyle(node).lineHeight) || rect.height;
                  return { text: node.textContent.trim(), lines: rect.height / lineHeight, scrollWidth: node.scrollWidth, clientWidth: node.clientWidth };
                });
                const meterTops = meters.map(node => Math.round(node.getBoundingClientRect().top * 10) / 10);
                const gradeTops = grades.map(node => Math.round(node.getBoundingClientRect().top * 10) / 10);
                return {
                  viewportWidth: innerWidth,
                  documentWidth: document.documentElement.scrollWidth,
                  overflow: document.documentElement.scrollWidth > innerWidth + 1,
                  titleText: (title?.textContent || "").replace(/\s+/g, " ").trim(),
                  titleLabel: title?.getAttribute("aria-label"),
                  headingMetrics,
                  meterSpread: Math.max(...meterTops) - Math.min(...meterTops),
                  gradeSpread: Math.max(...gradeTops) - Math.min(...gradeTops)
                };
              });

              if (metrics.overflow) failures.push(`${item.name}: horizontal overflow ${metrics.documentWidth}/${metrics.viewportWidth}`);
              if (metrics.titleText !== "90 − 4 = 86.") failures.push(`${item.name}: visible equation ${JSON.stringify(metrics.titleText)}`);
              if (metrics.titleLabel !== "90 minus 4 equals 86") failures.push(`${item.name}: accessible equation label missing`);
              if (runtimeErrors.length) failures.push(`${item.name}: runtime errors: ${runtimeErrors.join(" | ")}`);
              if (failedAssets.length) failures.push(`${item.name}: failed assets: ${failedAssets.join(" | ")}`);
              if (item.width >= 1181) {
                const wrapped = metrics.headingMetrics.filter(metric => metric.lines > 1.25 || metric.scrollWidth > metric.clientWidth + 1);
                if (wrapped.length) failures.push(`${item.name}: axis labels do not fit: ${JSON.stringify(wrapped)}`);
                if (metrics.meterSpread > 2) failures.push(`${item.name}: meter spread ${metrics.meterSpread}px`);
                if (metrics.gradeSpread > 2) failures.push(`${item.name}: grade spread ${metrics.gradeSpread}px`);
              }
              await page.locator("#score").screenshot({ path: `metro-score-layout-qa/${item.name}-score.png` });
              results.push({ ...item, metrics, runtimeErrors, failedAssets });
              await context.close();
            }

            await browser.close();
            fs.writeFileSync("metro-score-layout-qa/report.json", JSON.stringify({ results, failures }, null, 2));
            fs.writeFileSync("metro-score-layout-qa/summary.txt", failures.length ? `FAILED\n${failures.join("\n")}\n` : "PASSED\nSymbolic equation, label fit, and receipt alignment verified.\n");
            if (failures.length) process.exit(1);
          })().catch(error => { fs.writeFileSync("metro-score-layout-qa/fatal.txt", `${error.stack || error}\n`); process.exit(1); });
          NODE

      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metro-score-layout-qa
          path: metro-score-layout-qa
          if-no-files-found: error

      - name: Commit correction when needed
        if: steps.qa.outcome == 'success'
        run: |
          if git diff --quiet -- assets/review-dossier-polish.css reviews/metro-2033-redux/index.html; then
            echo "Correction already committed."
            exit 0
          fi
          git config user.name "Kenessy"
          git config user.email "208315348+Kenessy@users.noreply.github.com"
          git add assets/review-dossier-polish.css reviews/metro-2033-redux/index.html
          git commit -m "Fix Metro score anatomy layout"
          git push origin HEAD:agent/fix-metro-score-anatomy-layout

      - name: Preserve browser QA result
        if: steps.qa.outcome == 'failure'
        run: exit 1
