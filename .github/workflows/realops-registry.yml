name: REALOPS registry

on:
  push:
    branches: [main]
    paths:
      - "works/**"
      - "index/**"
      - "assets/realops-dossier.css"
      - "docs/realops-01-import-audit.md"
      - "sitemap.xml"
      - "llms.txt"
      - "tools/check_realops_registry.py"
      - ".github/workflows/realops-registry.yml"
  pull_request:
    paths:
      - "works/**"
      - "index/**"
      - "assets/realops-dossier.css"
      - "docs/realops-01-import-audit.md"
      - "sitemap.xml"
      - "llms.txt"
      - "tools/check_realops_registry.py"
      - ".github/workflows/realops-registry.yml"

permissions:
  contents: read

jobs:
  verify-published-dossier:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Verify REALOPS dossier and registry
        run: python tools/check_realops_registry.py
