name: Metro review visual QA

on:
  pull_request:
    paths:
      - "index.html"
      - "thought/**"
      - "reviews/**"
      - "index/**"
      - "assets/review-*.css"
      - "assets/reviews/**"
      - ".github/workflows/metro-review-visual-qa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install browser tooling
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run responsive review audit
        id: audit
        continue-on-error: true
        run: |
          mkdir -p metro-review-qa
          python3 -m http.server 8000 --bind 127.0.0.1 > metro-review-qa/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/reviews/metro-2033-redux/ > /dev/null; then
              break
            fi
            sleep 1
          done

          node <<'NODE'
          const fs = require("fs");
          const { chromium } = require("playwright");

          const cases = [
            { name: "desktop-1440", width: 1440, height: 1000, scale: 1, javascript: true },
            { name: "laptop-1024", width: 1024, height: 900, scale: 1, javascript: true },
            { name: "tablet-768", width: 768, height: 1000, scale: 1, javascript: true },
            { name: "mobile-390", width: 390, height: 844, scale: 1, javascript: true },
            { name: "mobile-320", width: 320, height: 800, scale: 1, javascript: true },
            { name: "mobile-390-text-200", width: 390, height: 844, scale: 2, javascript: true },
            { name: "mobile-390-no-js", width: 390, height: 844, scale: 1, javascript: false }
          ];

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const failures = [];
            const results = [];

            for (const item of cases) {
              const context = await browser.newContext({
                viewport: { width: item.width, height: item.height },
                javaScriptEnabled: item.javascript,
                reducedMotion: "reduce"
              });
              const page = await context.newPage();
              const runtimeErrors = [];
              const failedAssets = [];
              page.on("pageerror", error => runtimeErrors.push(String(error)));
              page.on("console", message => {
                if (message.type() === "error") runtimeErrors.push(message.text());
              });
              page.on("response", response => {
                const url = response.url();
                if (url.startsWith("http://127.0.0.1:8000/") && response.status() >= 400) {
                  failedAssets.push(`${response.status()} ${url}`);
                }
              });

              const response = await page.goto("http://127.0.0.1:8000/reviews/metro-2033-redux/", { waitUntil: "networkidle" });
              if (!response || response.status() !== 200) failures.push(`${item.name}: route did not return HTTP 200`);

              if (item.scale === 2) {
                await page.evaluate(() => {
                  document.documentElement.style.fontSize = "200%";
                });
                await page.waitForTimeout(120);
              }

              const metrics = await page.evaluate(() => {
                const main = document.querySelector("main[data-review-id='FP-REV-0001']");
                const axisScores = [...document.querySelectorAll("[data-axis-score]")].map(node => Number(node.getAttribute("data-axis-score")));
                const bodyText = document.body.innerText.toLowerCase();
                const offenders = [...document.querySelectorAll("body *")].map(node => {
                  const rect = node.getBoundingClientRect();
                  const style = getComputedStyle(node);
                  return {
                    tag: node.tagName.toLowerCase(),
                    id: node.id || "",
                    className: typeof node.className === "string" ? node.className : "",
                    left: Math.round(rect.left),
                    right: Math.round(rect.right),
                    width: Math.round(rect.width),
                    scrollWidth: node.scrollWidth,
                    display: style.display,
                    whiteSpace: style.whiteSpace,
                    overflowX: style.overflowX,
                    text: (node.textContent || "").replace(/\s+/g, " ").trim().slice(0, 90)
                  };
                }).filter(item => item.display !== "none" && (item.right > window.innerWidth + 1 || item.left < -1)).slice(0, 30);
                return {
                  viewportWidth: window.innerWidth,
                  documentWidth: document.documentElement.scrollWidth,
                  horizontalOverflow: document.documentElement.scrollWidth > window.innerWidth + 1,
                  offenders,
                  h1Count: document.querySelectorAll("h1").length,
                  reviewId: main?.getAttribute("data-review-id"),
                  raw: Number(main?.getAttribute("data-review-raw")),
                  correction: Number(main?.getAttribute("data-review-correction")),
                  score: Number(main?.getAttribute("data-review-score")),
                  axisScores,
                  evidenceArcs: document.querySelectorAll(".evidence-arc").length,
                  auditCards: document.querySelectorAll(".audit-card").length,
                  frictionRows: document.querySelectorAll(".friction-row").length,
                  tasteCards: document.querySelectorAll(".taste-card").length,
                  fitGates: document.querySelectorAll(".fit-gate").length,
                  legalRoute: Boolean(document.querySelector('a[href="/legal/"]')),
                  titleVisible: bodyText.includes("metro 2033 redux"),
                  verdictVisible: bodyText.includes("strong / caveated buy")
                };
              });

              if (metrics.horizontalOverflow) failures.push(`${item.name}: horizontal overflow ${metrics.documentWidth}/${metrics.viewportWidth}: ${JSON.stringify(metrics.offenders)}`);
              if (metrics.h1Count !== 1) failures.push(`${item.name}: expected one H1, got ${metrics.h1Count}`);
              if (metrics.reviewId !== "FP-REV-0001") failures.push(`${item.name}: missing review id`);
              if (metrics.raw !== 90 || metrics.correction !== -4 || metrics.score !== 86) failures.push(`${item.name}: score receipt mismatch`);
              if (JSON.stringify(metrics.axisScores) !== JSON.stringify([20, 17, 17, 17, 19])) failures.push(`${item.name}: axis sequence mismatch`);
              if (metrics.evidenceArcs !== 9) failures.push(`${item.name}: expected 9 evidence arcs`);
              if (metrics.auditCards !== 8) failures.push(`${item.name}: expected 8 audit cards`);
              if (metrics.frictionRows !== 4) failures.push(`${item.name}: expected 4 friction rows`);
              if (metrics.tasteCards !== 7) failures.push(`${item.name}: expected 7 taste cards`);
              if (metrics.fitGates !== 3) failures.push(`${item.name}: expected 3 fit gates`);
              if (!metrics.legalRoute || !metrics.titleVisible || !metrics.verdictVisible) failures.push(`${item.name}: required public copy or legal route missing`);
              if (runtimeErrors.length) failures.push(`${item.name}: runtime errors: ${runtimeErrors.join(" | ")}`);
              if (failedAssets.length) failures.push(`${item.name}: failed assets: ${failedAssets.join(" | ")}`);

              await page.locator(".dossier-hero").screenshot({ path: `metro-review-qa/${item.name}-hero.png` });
              if (item.name === "desktop-1440" || item.name === "mobile-390") {
                await page.locator("#score").screenshot({ path: `metro-review-qa/${item.name}-score.png` });
              }
              results.push({ ...item, ...metrics, runtimeErrors, failedAssets });
              await context.close();
            }

            const indexRoutes = ["/", "/thought/", "/reviews/", "/index/"];
            const indexContext = await browser.newContext({ viewport: { width: 1200, height: 900 }, reducedMotion: "reduce" });
            const indexPage = await indexContext.newPage();
            for (const route of indexRoutes) {
              const response = await indexPage.goto(`http://127.0.0.1:8000${route}`, { waitUntil: "networkidle" });
              const hasRoute = await indexPage.locator('a[href="/reviews/metro-2033-redux/"]').count();
              if (!response || response.status() !== 200) failures.push(`${route}: index route did not return HTTP 200`);
              if (!hasRoute) failures.push(`${route}: missing Metro review link`);
            }
            await indexContext.close();

            const coverContext = await browser.newContext({ viewport: { width: 1200, height: 630 } });
            const coverPage = await coverContext.newPage();
            const coverResponse = await coverPage.goto("http://127.0.0.1:8000/assets/reviews/metro-2033-redux-og.svg", { waitUntil: "networkidle" });
            if (!coverResponse || coverResponse.status() !== 200) failures.push("social cover did not return HTTP 200");
            await coverPage.screenshot({ path: "metro-review-qa/metro-2033-redux-og.png" });
            await coverContext.close();
            await browser.close();

            fs.writeFileSync("metro-review-qa/report.json", JSON.stringify({ results, failures }, null, 2));
            fs.writeFileSync("metro-review-qa/summary.txt", failures.length ? `FAILED\n${failures.join("\n")}\n` : "PASSED\nAll Metro review responsive and registry assertions passed.\n");
            if (failures.length) process.exit(1);
          })().catch(error => {
            fs.writeFileSync("metro-review-qa/fatal.txt", `${error.stack || error}\n`);
            process.exit(1);
          });
          NODE
      - name: Upload Metro review QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metro-review-visual-qa
          path: metro-review-qa
          if-no-files-found: error
      - name: Preserve audit result
        if: steps.audit.outcome == 'failure'
        run: exit 1
