name: Finalize Moonlight navigation mount

on:
  push:
    branches:
      - agent/mount-moonlight-navigation

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/mount-moonlight-navigation
          fetch-depth: 0
      - name: Finalize and validate
        shell: bash
        run: |
          rm .github/workflows/finalize-moonlight-mount.yml
          rm -f docs/moonlight-mount-debug.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<div class="field-feature-intro"><p>An atmosphere-first survival FPS examined through explicit score math, audience fit, friction, risk and route-level evidence. <strong>In production:</strong> <a href="/reviews/moonlight-peaks/">Moonlight Peaks living review</a>, score locked while evidence is captured.</p><a class="button button-primary" href="/reviews/metro-2033-redux/">Open Metro dossier</a></div>'
          new = '<div class="field-feature-intro"><p>An atmosphere-first survival FPS examined through explicit score math, audience fit, friction, risk and route-level evidence.</p><a class="button button-primary" href="/reviews/metro-2033-redux/">Open Metro dossier</a></div><p><strong>In production:</strong> <a href="/reviews/moonlight-peaks/">Moonlight Peaks living review</a>, score locked while evidence is captured.</p>'
          if text.count(old) != 1:
              raise SystemExit('Homepage Moonlight crosslink anchor missing or duplicated')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          python3 tools/check_editorial_style.py
          python3 tools/check_ip_notices.py
          python3 tools/check_review_registry.py
          python3 tools/check_moonlight_peaks_scaffold.py
          python3 tools/check_social_cards.py
          python3 tools/check_search_contract.py
          python3 tools/check_site_integrity.py
          python3 tools/check_security_contract.py
          python3 tools/check_accessibility_contract.py
          python3 tools/check_public_surface.py --history
          python3 tools/check_realops_registry.py
          git diff --check

          git add -A
          git commit -m "Mount Moonlight Peaks across public navigation"
          git push origin HEAD:agent/mount-moonlight-navigation
