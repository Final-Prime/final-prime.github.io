name: Pages state diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/pages-state-diagnostic.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  deployments: read
  pages: read

jobs:
  capture-pages-state:
    runs-on: ubuntu-latest
    steps:
      - name: Capture Pages API and live headers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pages-state
          printf 'Captured: %s\nRepository: %s\n' "$(date -u +%FT%TZ)" "$GITHUB_REPOSITORY" > pages-state/context.txt
          api_get() {
            target="$1"
            output="$2"
            curl -sS -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -w '\nHTTP_STATUS:%{http_code}\n' \
              "$target" > "$output"
          }
          api_get "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" pages-state/pages.json
          api_get "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds/latest" pages-state/latest-build.json
          api_get "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=10" pages-state/deployments.json
          curl -sS -D pages-state/home.headers -o pages-state/home.html "https://final-prime.github.io/?v=${GITHUB_RUN_ID}"
          curl -sS -D pages-state/hero.headers -o pages-state/hero.css "https://final-prime.github.io/assets/hero.css?v=${GITHUB_RUN_ID}"
          {
            printf 'Main merge target: 35df7f2439560d025c65f9390529f396a3db5294\n'
            printf 'Live hero new marker count: '
            grep -Fc '.doctrine::before' pages-state/hero.css || true
            printf 'Live hero old marker count: '
            grep -Fc '.doctrine { margin: 0; }' pages-state/hero.css || true
          } > pages-state/marker-summary.txt

      - name: Upload Pages state
        uses: actions/upload-artifact@v4
        with:
          name: pages-state-diagnostic
          path: pages-state
          if-no-files-found: error
