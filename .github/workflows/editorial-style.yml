name: Editorial style

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  no-long-dashes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enforce editorial punctuation rules
        run: python tools/check_editorial_style.py
