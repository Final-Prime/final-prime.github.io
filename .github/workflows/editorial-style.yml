name: Editorial style

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  no-long-dashes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enforce editorial punctuation rules
        id: editorial
        continue-on-error: true
        run: python tools/check_editorial_style.py > editorial-report.txt 2>&1
      - name: Upload editorial report
        uses: actions/upload-artifact@v4
        with:
          name: editorial-report
          path: editorial-report.txt
          if-no-files-found: error
      - name: Preserve editorial gate result
        if: steps.editorial.outcome == 'failure'
        run: exit 1
