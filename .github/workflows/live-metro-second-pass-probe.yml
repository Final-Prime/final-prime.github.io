name: Live Metro second-pass probe

on:
  pull_request:
    paths:
      - ".github/workflows/live-metro-second-pass-probe.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  deployments: read
  pages: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install browser tooling
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Probe deployed assets and interactions
        id: probe
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p live-metro-second-pass
          api_get() {
            target="$1"
            output="$2"
            curl -sS -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -w '\nHTTP_STATUS:%{http_code}\n' \
              "$target" > "$output"
          }
          api_get "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" live-metro-second-pass/pages.json
          api_get "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds/latest" live-metro-second-pass/latest-build.json
          api_get "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=10" live-metro-second-pass/deployments.json

          success=0
          for attempt in $(seq 1 36); do
            key="${GITHUB_RUN_ID}-${attempt}"
            if curl -fsSL --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "https://final-prime.github.io/reviews/metro-2033-redux/?v=${key}" -o live-metro-second-pass/review.html \
              && curl -fsSL --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "https://final-prime.github.io/assets/review-dossier-polish.css?v=${key}" -o live-metro-second-pass/polish.css \
              && curl -fsSL --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "https://final-prime.github.io/assets/review-dossier.js?v=${key}" -o live-metro-second-pass/dossier.js \
              && grep -Fq '/assets/review-dossier-polish.css' live-metro-second-pass/review.html \
              && grep -Fq 'data-evidence-toolbar' live-metro-second-pass/review.html \
              && grep -Fq 'itemscope itemtype="https://schema.org/Review"' live-metro-second-pass/review.html \
              && grep -Fq '.evidence-toolbar' live-metro-second-pass/polish.css \
              && grep -Fq -- '--dossier-progress' live-metro-second-pass/polish.css \
              && grep -Fq 'activationOffset' live-metro-second-pass/dossier.js \
              && grep -Fq 'finishBulkUpdate' live-metro-second-pass/dossier.js; then
              success=1
              printf 'Static live markers visible on attempt %s.\n' "$attempt" > live-metro-second-pass/static-status.txt
              break
            fi
            printf 'Attempt %s did not yet expose all merged assets.\n' "$attempt" >> live-metro-second-pass/attempts.txt
            sleep 5
          done

          if [ "$success" -ne 1 ]; then
            printf 'FAILED\nMerged second-pass assets were not visible after 36 attempts.\n' > live-metro-second-pass/summary.txt
            exit 1
          fi

          node <<'NODE'
          const fs = require("fs");
          const { chromium } = require("playwright");

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const failures = [];
            const results = [];
            for (const viewport of [{ name: "desktop", width: 1440, height: 1000 }, { name: "mobile", width: 390, height: 844 }]) {
              const context = await browser.newContext({ viewport: { width: viewport.width, height: viewport.height }, reducedMotion: "reduce" });
              const page = await context.newPage();
              const errors = [];
              const failedAssets = [];
              page.on("pageerror", error => errors.push(String(error)));
              page.on("console", message => { if (message.type() === "error") errors.push(message.text()); });
              page.on("response", response => {
                if (response.url().startsWith("https://final-prime.github.io/") && response.status() >= 400) failedAssets.push(`${response.status()} ${response.url()}`);
              });
              const response = await page.goto(`https://final-prime.github.io/reviews/metro-2033-redux/?live=${Date.now()}-${viewport.name}`, { waitUntil: "networkidle" });
              if (!response || response.status() !== 200) failures.push(`${viewport.name}: review route did not return HTTP 200`);
              const baseline = await page.evaluate(() => ({
                reviewType: document.querySelector("main[data-review-id='FP-REV-0001']")?.getAttribute("itemtype"),
                ratingValue: document.querySelector('[itemprop="ratingValue"]')?.getAttribute("content"),
                horizontalOverflow: document.documentElement.scrollWidth > window.innerWidth + 1,
                evidenceCount: document.querySelectorAll("details.evidence-arc").length
              }));
              if (baseline.reviewType !== "https://schema.org/Review" || baseline.ratingValue !== "86") failures.push(`${viewport.name}: live schema or rating missing`);
              if (baseline.horizontalOverflow || baseline.evidenceCount !== 9) failures.push(`${viewport.name}: live layout or evidence count mismatch`);

              await page.locator('[data-dossier-nav] a[href="#evidence"]').click();
              await page.waitForTimeout(320);
              const navState = await page.evaluate(() => {
                const header = document.querySelector(".site-header");
                const nav = document.querySelector("[data-dossier-nav]");
                const evidence = document.querySelector("#evidence");
                return {
                  current: nav?.querySelector('a[aria-current="location"]')?.getAttribute("href"),
                  sectionTop: evidence?.getBoundingClientRect().top,
                  requiredTop: (header?.getBoundingClientRect().height || 0) + (nav?.getBoundingClientRect().height || 0) - 3,
                  progress: Number.parseFloat(getComputedStyle(nav).getPropertyValue("--dossier-progress")) || 0
                };
              });
              if (navState.current !== "#evidence" || navState.sectionTop < navState.requiredTop || !(navState.progress > 0)) failures.push(`${viewport.name}: live dossier navigation state failed`);

              await page.locator("[data-evidence-open-light]").click();
              await page.waitForTimeout(120);
              const expanded = await page.evaluate(() => ({
                all: document.querySelectorAll("details.evidence-arc[open]").length,
                light: document.querySelectorAll('details.evidence-arc[data-spoiler="light"][open]').length,
                medium: document.querySelectorAll('details.evidence-arc[data-spoiler="medium"][open]').length,
                heavy: document.querySelectorAll('details.evidence-arc[data-spoiler="heavy"][open]').length,
                status: document.querySelector("[data-evidence-status]")?.textContent.trim()
              }));
              if (expanded.all !== 6 || expanded.light !== 6 || expanded.medium !== 0 || expanded.heavy !== 0 || !expanded.status?.includes("6 spoiler-light arcs expanded")) failures.push(`${viewport.name}: live spoiler boundary failed`);

              await page.locator("[data-evidence-collapse]").click();
              await page.waitForTimeout(120);
              const collapsed = await page.evaluate(() => ({
                open: document.querySelectorAll("details.evidence-arc[open]").length,
                status: document.querySelector("[data-evidence-status]")?.textContent.trim()
              }));
              if (collapsed.open !== 0 || collapsed.status !== "All evidence arcs collapsed.") failures.push(`${viewport.name}: live collapse state failed`);
              if (errors.length) failures.push(`${viewport.name}: runtime errors: ${errors.join(" | ")}`);
              if (failedAssets.length) failures.push(`${viewport.name}: failed assets: ${failedAssets.join(" | ")}`);

              await page.locator(".dossier-hero").screenshot({ path: `live-metro-second-pass/${viewport.name}-hero.png` });
              await page.locator("#evidence").screenshot({ path: `live-metro-second-pass/${viewport.name}-evidence.png` });
              results.push({ viewport, baseline, navState, expanded, collapsed, errors, failedAssets });
              await context.close();
            }
            await browser.close();
            fs.writeFileSync("live-metro-second-pass/browser-report.json", JSON.stringify({ results, failures }, null, 2));
            if (failures.length) {
              fs.writeFileSync("live-metro-second-pass/summary.txt", `FAILED\n${failures.join("\n")}\n`);
              process.exit(1);
            }
            const staticStatus = fs.readFileSync("live-metro-second-pass/static-status.txt", "utf8").trim();
            fs.writeFileSync("live-metro-second-pass/summary.txt", `PASSED\n${staticStatus}\nDesktop and mobile live interactions passed.\n`);
          })().catch(error => {
            fs.writeFileSync("live-metro-second-pass/fatal.txt", `${error.stack || error}\n`);
            process.exit(1);
          });
          NODE

          {
            printf '\nSHA256\n'
            sha256sum live-metro-second-pass/review.html live-metro-second-pass/polish.css live-metro-second-pass/dossier.js
          } >> live-metro-second-pass/summary.txt
      - name: Upload live evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-metro-second-pass
          path: live-metro-second-pass
          if-no-files-found: error
      - name: Preserve probe result
        if: steps.probe.outcome == 'failure'
        run: exit 1
